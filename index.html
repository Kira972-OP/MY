<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Test - Main Menu</title>
    <style>
        /* รีเซ็ตค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        /* การตั้งค่า Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between; /* ดันโลโก้กับเมนูให้อยู่ห่างกัน */
            align-items: center; /* จัดให้อยู่กึ่งกลางแนวตั้ง */
            background-color: #2c3e50;
            padding: 15px 50px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links li a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links li a:hover {
            color: #3498db; /* เปลี่ยนสีเมื่อเอาเมาส์ชี้ */
        }

        /* การตั้งค่าส่วนเนื้อหาหลัก (Main Menu) */
        .main-content {
            text-align: center;
            padding: 80px 20px;
        }

        .main-content h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .main-content p {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        /* ปุ่มเมนูจำลอง */
        .menu-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .menu-card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-5px); /* เด้งขึ้นเล็กน้อยเมื่อเอาเมาส์ชี้ */
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .menu-card h3 {
            margin-bottom: 10px;
            color: #34495e;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Project Test</div>
        <ul class="nav-links">
            <li><a href="#">หน้าแรก</a></li>
            <li><a href="#">ระบบงาน</a></li>
            <li><a href="#">ตั้งค่า</a></li>
            <li><a href="#">ออกจากระบบ</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1>ยินดีต้อนรับสู่โปรเจกต์ของคุณ</h1>
        <p>กรุณาเลือกเมนูการทำงานที่ต้องการ</p>
        <div class="menu-grid">
            <a href="modul1.html">
                <div class="menu-card">
                    <h3>โมดูลที่ 1</h3>
                    <p>รายละเอียดการทำงานเบื้องต้น</p>
                </div>
            </a>
            <div class="menu-card">
                <h3>โมดูลที่ 2</h3>
                <p>จัดการข้อมูลและรายงาน</p>
            </div>
            <div class="menu-card">
                <h3>เครื่องมือ</h3>
                <p>อรรถประโยชน์เสริม</p>
            </div>
        </div>
    </main>

</body>
</html>
